<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- C'EST CELUI-CI -->
    <title>Vélo d'occasion </title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>
    <div class="home-screen" id="homeScreen">
        <h1>Deux salles, Deux ambiances</h1>
        <p>Bon annif...</p>
        <div class="portals-container">
            <div class="interactive-portal" id="portal1" data-music="mp3/le_blinquant_du_mogo.mp3" data-eye-image="pics/eyes1.png">
                <img src="pics/10.jpg" alt="Regard 1">
            </div>
            <div class="interactive-portal" id="portal2" data-music="mp3/music2.mp3" data-eye-image="pics/eyes2.png">
                <img src="pics/20.jpg" alt="Regard 2">
            </div>
        </div>
    </div>

    <div class="transition-effect" id="transitionEffect"></div>

    <div class="experience-screen" id="experienceScreen">
        <canvas id="visualizerCanvas"></canvas>
        <div class="background-eye-image" id="backgroundEyeImage"></div>
        <div class="images-floating-container" id="imagesFloatingContainer">
            <!--  images flotteront ici -->
        </div>
    </div>

    <audio id="musicPlayer" src="" preload="auto"></audio> 

    <script src="JavaScript/java.js"></script> 
</body>
</html>
